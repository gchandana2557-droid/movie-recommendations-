<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="box">

<h1>Recommended Movies For {{ name }}</h1>

{% if movies %}

<ul>
    {% for movie in movies %}
    <li>{{ movie }}</li>
    {% endfor %}
</ul>

{% else %}

<h2>{{ message }}</h2>

<form action="/rating" method="get">
    <button type="submit">Change Rating</button>
</form>

{% endif %}

</div>

</body>
</html>
